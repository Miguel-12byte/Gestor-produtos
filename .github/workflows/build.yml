name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🟢 Node (deixe o GitHub gerenciar internamente)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ☕ Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 📦 Dependências
      - name: Install dependencies
        run: npm install || true

      # 🌐 Garantir app web
      - name: Ensure www
        run: |
          mkdir -p www
          if [ ! -f www/index.html ]; then
            echo "<!doctype html><html><body><h1>Gestor OK</h1></body></html>" > www/index.html
          fi

      # ⚙️ Capacitor
      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # 📱 Android
      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync

      # 🔨 Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # 📦 Upload
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
