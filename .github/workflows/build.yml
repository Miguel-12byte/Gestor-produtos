name: Build APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clonar repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🟢 Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ☕ Java 17 (necessário para Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 📦 Instalar dependências (sem quebrar se não tiver lock file)
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install --no-audit --no-fund || true
          else
            echo "Sem package.json, pulando install"
          fi

      # 🌐 Garantir estrutura web
      - name: Prepare web app
        run: |
          mkdir -p www
          if [ ! -f www/index.html ]; then
            echo "<!doctype html><html><body><h1>Gestor funcionando</h1></body></html>" > www/index.html
          fi

      - name: Init Capacitor
  run: |
    npx cap init gestor com.miguel.gestorprodutos --web-dir=www || true
      # ⚙️ Inicializar Capacitor
      - name: Init Capacitor
        run: |
          npx cap init gestor com.miguel.gestorprodutos --web-dir=www --yes

      # 📱 Adicionar Android
      - name: Add Android platform
        run: npx cap add android

      # 🔄 Sincronizar arquivos
      - name: Sync project
        run: npx cap sync

      # 🔨 Build APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # 📦 Upload do APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gestor-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
