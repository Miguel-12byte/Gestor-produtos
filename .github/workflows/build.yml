name: Build APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout atualizado
      - name: Checkout
        uses: actions/checkout@v4

      # 🟢 Node 24 REAL
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      # ☕ Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 📦 Dependências
      - name: Install dependencies
        run: npm install || true

      # 🌐 Garantir app
      - name: Ensure www
        run: |
          mkdir -p www
          if [ ! -f www/index.html ]; then
            echo "<!doctype html><html><body><h1>Gestor OK</h1></body></html>" > www/index.html
          fi

      # ⚙️ Capacitor
      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # 📱 Android
      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync

      # 🔨 Build
      - name: Build APK
        run: |
          cd android
          chmod
