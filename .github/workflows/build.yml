<script>
let data = JSON.parse(localStorage.getItem('produtos') || '[]')

// 🔄 MIGRAR DADOS ANTIGOS (IMPORTANTE)
data = data.map(p => ({
  name: p.name || p.n || '',
  price: Number(p.price ?? p.p ?? 0),
  qty: Number(p.qty ?? 0),
  category: p.category || 'Geral'
}))

save()

function save(){
  localStorage.setItem('produtos', JSON.stringify(data))
}

function add(){
  const name = document.getElementById('name').value.trim()
  const price = parseFloat(document.getElementById('price').value) || 0
  const qty = parseInt(document.getElementById('qty').value) || 0
  const category = document.getElementById('category').value

  if(!name){
    alert('Nome obrigatório')
    return
  }

  data.push({ name, price, qty, category })
  save()
  clear()
  render()
}

function clear(){
  ['name','price','qty'].forEach(id=>{
    document.getElementById(id).value = ''
  })
}

function remove(i){
  if(confirm('Excluir produto?')){
    data.splice(i,1)
    save()
    render()
  }
}

function render(){
  const list = document.getElementById('list')
  const searchInput = document.getElementById('search')
  const search = (searchInput.value || '').toLowerCase()

  list.innerHTML = ''
  let total = 0

  data
    .filter(p => (p.name || '').toLowerCase().includes(search))
    .forEach((p,i)=>{
      const price = Number(p.price) || 0
      const qty = Number(p.qty) || 0

      total += price * qty

      list.innerHTML += `
        <div class="card">
          <div class="flex">
            <div>
              <b>${p.name || 'Sem nome'}</b><br>
              <span class="small">${p.category || 'Geral'}</span><br>
              R$ ${price.toFixed(2)} | Qtd: ${qty}
            </div>
            <button onclick="remove(${i})">X</button>
          </div>
        </div>
      `
    })

  document.getElementById('total').innerText =
    "Total estoque: R$ " + total.toFixed(2)
}

function exportData(){
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"})
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = "backup.json"
  a.click()
}

// 🚀 iniciar
render()
</script>
