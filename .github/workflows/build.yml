name: Build APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clonar repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 🟢 Node 24
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ☕ Java (OBRIGATÓRIO pro Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 📦 Instalar dependências
      - name: Install dependencies
        run: npm install || true

      # 🌐 Garantir app web
      - name: Create www
        run: |
          mkdir -p www
          echo "<!doctype html><html><body><h1>Gestor OK</h1></body></html>" > www/index.html

      # ⚙️ Capacitor
      - name: Install Capacitor
        run: |
          npm install @capacitor/core
          npm install @capacitor/cli
          npm install @capacitor/android

      - name: Init Capacitor
        run: npx cap init gestor com.gestor.app --web-dir=www --yes

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync

      # 🔨 Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      # 📦 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
