name: Build APK

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clonar repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 🟢 Node 24 (SEM CACHE → evita erro do package-lock)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # ☕ Java (necessário pro Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 📦 Instalar dependências (não quebra se não tiver)
      - name: Install dependencies
        run: npm install || true

      # 🌐 Garantir que existe app web
      - name: Create www
        run: |
          mkdir -p www
          if [ ! -f www/index.html ]; then
            echo "<!doctype html><html><body><h1>Gestor OK</h1></body></html>" > www/index.html
          fi

      # ⚙️ Capacitor
      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        run: npx cap init gestor com.gestor.app --web-dir=www --yes

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync

      # 🔨 Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 📦 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
