<script>
let produtos = JSON.parse(localStorage.getItem('produtos')||'[]')

function add(){
  let n = name.value.trim()
  let p = parseFloat(price.value)

  if(!n) return alert('Digite o nome')
  if(isNaN(p)) p = 0

  produtos.push({n,p})
  localStorage.setItem('produtos',JSON.stringify(produtos))

  name.value=''
  price.value=''

  render()
}

function del(i){
  produtos.splice(i,1)
  localStorage.setItem('produtos',JSON.stringify(produtos))
  render()
}

function render(){
  list.innerHTML=''
  produtos.forEach((x,i)=>{
    list.innerHTML += `
      <div class="card">
        ${x.n} - R$ ${x.p.toFixed(2)}
        <button onclick="del(${i})">Excluir</button>
      </div>`
  })
}

render()
</script><body>

<header>Gestor de Produtos</header>

<div class="container">

<input id="name" placeholder="Produto">
<input id="price" type="number" placeholder="Preço">

<button onclick="add()">Salvar</button>

<div id="list"></div>

</div>

<script>
let produtos = JSON.parse(localStorage.getItem('produtos')||'[]')

function add(){
  let n = name.value
  let p = price.value
  if(!n) return alert('Digite o nome')
  produtos.push({n,p})
  localStorage.setItem('produtos',JSON.stringify(produtos))
  render()
}

function render(){
  list.innerHTML=''
  produtos.forEach(x=>{
    list.innerHTML += `<div class="card">${x.n} - R$ ${x.p||0}</div>`
  })
}

render()
</script>

</body>
</html>
